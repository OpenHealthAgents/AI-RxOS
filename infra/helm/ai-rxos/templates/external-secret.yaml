{{- /*
External Secrets Operator scaffold. Renders only when
externalSecret.enabled=true (values-prod.yaml), producing the same
Secret (name + keys) that templates/secret.yaml would otherwise create
from plaintext values — so ai-rxos.secretName and every Deployment's
envFrom keep working unchanged either way.

Requires the External Secrets Operator (https://external-secrets.io) and
a SecretStore/ClusterSecretStore named externalSecret.secretStoreRef.name
to already exist in-cluster; this template does not create either. Each
remoteRef.key below assumes the backing store holds one entry per field
under an "ai-rxos/" prefix — adjust to match your provider's actual
layout (AWS Secrets Manager, Vault, etc) before relying on this.
*/}}
{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "ai-rxos.fullname" . }}-external-secret
  namespace: {{ include "ai-rxos.namespace" . }}
  labels:
    {{- include "ai-rxos.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ .Values.externalSecret.name }}
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef: { key: ai-rxos/postgres-password }
    - secretKey: DATABASE_URL
      remoteRef: { key: ai-rxos/database-url }
    - secretKey: NEO4J_PASSWORD
      remoteRef: { key: ai-rxos/neo4j-password }
    - secretKey: REDIS_PASSWORD
      remoteRef: { key: ai-rxos/redis-password }
    - secretKey: OPENSEARCH_PASSWORD
      remoteRef: { key: ai-rxos/opensearch-password }
    - secretKey: JWT_SECRET
      remoteRef: { key: ai-rxos/jwt-secret }
    - secretKey: BETTER_AUTH_SECRET
      remoteRef: { key: ai-rxos/better-auth-secret }
    - secretKey: LLM_WIKI_API_KEY
      remoteRef: { key: ai-rxos/llm-wiki-api-key }
    - secretKey: GOOGLE_OKF_API_KEY
      remoteRef: { key: ai-rxos/google-okf-api-key }
{{- end }}
