{{- if .Values.ingress.enabled }}
{{- $root := . }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ai-rxos.fullname" . }}
  namespace: {{ include "ai-rxos.namespace" . }}
  labels:
    {{- include "ai-rxos.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - secretName: {{ .Values.ingress.tls.secretName }}
      hosts:
        {{- range $key, $host := .Values.ingress.hosts }}
        - {{ $host }}
        {{- end }}
  {{- end }}
  rules:
    {{- range $name, $svc := .Values.services }}
    {{- if and $svc.enabled $svc.ingress }}
    - host: {{ index $root.Values.ingress.hosts $svc.ingress.host }}
      http:
        paths:
          - path: {{ $svc.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "ai-rxos.fullname" $root }}-{{ $name }}
                port:
                  number: {{ $svc.port }}
    {{- end }}
    {{- end }}
{{- end }}
