{{- $root := . }}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-rxos.fullname" $root }}-{{ $name }}
  namespace: {{ include "ai-rxos.namespace" $root }}
  labels:
    {{- include "ai-rxos.serviceLabels" (dict "root" $root "service" $name) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ $svc.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "ai-rxos.serviceSelectorLabels" (dict "root" $root "service" $name) | nindent 4 }}
---
{{- end }}
{{- end }}
