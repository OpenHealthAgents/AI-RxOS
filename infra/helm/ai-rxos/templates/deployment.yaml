{{- $root := . }}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-rxos.fullname" $root }}-{{ $name }}
  namespace: {{ include "ai-rxos.namespace" $root }}
  labels:
    {{- include "ai-rxos.serviceLabels" (dict "root" $root "service" $name) | nindent 4 }}
spec:
  {{- if not $svc.autoscaling.enabled }}
  replicas: {{ $svc.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ai-rxos.serviceSelectorLabels" (dict "root" $root "service" $name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ai-rxos.serviceLabels" (dict "root" $root "service" $name) | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ $svc.port | quote }}
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "ai-rxos.serviceAccountName" $root }}
      securityContext:
        {{- toYaml $root.Values.podSecurityContext | nindent 8 }}
      {{- if and $svc.gpu $svc.gpu.enabled }}
      nodeSelector:
        gpu: "true"
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      {{- end }}
      containers:
        - name: {{ $name }}
          securityContext:
            {{- toYaml $root.Values.securityContext | nindent 12 }}
          image: {{ include "ai-rxos.image" (dict "root" $root "svc" $svc) }}
          imagePullPolicy: {{ $root.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "ai-rxos.fullname" $root }}-config
            - secretRef:
                name: {{ include "ai-rxos.secretName" $root }}
          env:
            - name: PORT
              value: {{ $svc.port | quote }}
            {{- range $key, $value := $svc.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- if $svc.healthPath }}
          livenessProbe:
            httpGet:
              path: {{ $svc.healthPath }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ $svc.healthPath }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          {{- end }}
          resources:
            requests:
              {{- toYaml $svc.resources.requests | nindent 14 }}
            limits:
              {{- toYaml $svc.resources.limits | nindent 14 }}
              {{- if and $svc.gpu $svc.gpu.enabled }}
              nvidia.com/gpu: "1"
              {{- end }}
      {{- with $root.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
{{- end }}
{{- end }}
