{{- if not .Values.externalSecret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-rxos.fullname" . }}-secrets
  namespace: {{ include "ai-rxos.namespace" . }}
  labels:
    {{- include "ai-rxos.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s:%v/%s" .Values.config.postgresUser .Values.secrets.postgresPassword .Values.config.postgresHost .Values.config.postgresPort .Values.config.postgresDb | quote }}
  NEO4J_PASSWORD: {{ .Values.secrets.neo4jPassword | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | quote }}
  OPENSEARCH_PASSWORD: {{ .Values.secrets.opensearchPassword | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  BETTER_AUTH_SECRET: {{ .Values.secrets.betterAuthSecret | quote }}
  LLM_WIKI_API_KEY: {{ .Values.secrets.llmWikiApiKey | quote }}
  GOOGLE_OKF_API_KEY: {{ .Values.secrets.googleOkfApiKey | quote }}
{{- end }}
